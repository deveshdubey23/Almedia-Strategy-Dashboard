<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almedia Strategy Builder</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlack: '#000000',
                        brandDark: '#0B0F17',
                        brandCard: '#111827',
                        brandBlue: '#2563EB',
                        brandCyan: '#00D9FF',
                        brandBorder: '#1E293B',
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel standalone for browser compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .accent-slider {
            accent-color: #00D9FF;
        }
        .custom-scroll::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #1E293B;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #00D9FF;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Target: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" /></svg>,
            Zap: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            BarChart: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
            Users: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Calendar: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            ShieldAlert: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Download: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Mail: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
            Link: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
            Copy: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
            Check: () => <svg className="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
            Lightbulb: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
        };

        const AlmediaDashboard = () => {
            const [formData, setFormData] = useState({
                gameName: "Office Cat",
                studioName: "Stillfront Group",
                genre: "Puzzle",
                iapPercent: 80,
                adPercent: 20,
                primaryGate: "Starter Pack (€1.99)",
                d7Retention: 18,
                d60Ltv: 1.80,
                prevFreecash: false,
                targetInstalls: 5000,
                monthlyBudget: 50000,
                duration: "90 days"
            });

            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedBrief, setGeneratedBrief] = useState(null);
            const [activeTab, setActiveTab] = useState('summary');
            const [copiedText, setCopiedText] = useState(false);

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                if (name === 'iapPercent') {
                    const iap = parseInt(value) || 0;
                    setFormData(prev => ({ ...prev, iapPercent: iap, adPercent: 100 - iap }));
                } else {
                    setFormData(prev => ({
                        ...prev,
                        [name]: type === 'checkbox' ? checked : value
                    }));
                }
            };

            const generateStrategyBrief = () => {
                setIsGenerating(true);
                setGeneratedBrief(null);
                
                setTimeout(() => {
                    const isHighIap = formData.iapPercent > 70;
                    const isCasual = formData.genre === 'Puzzle' || formData.genre === 'Casual' || formData.genre === 'Hypercasual';
                    const isMidcore = formData.genre === 'RPG' || formData.genre === 'Strategy' || formData.genre === 'Shooter';
                    const baseD7 = parseInt(formData.d7Retention) || 15;
                    const budgetAmount = parseInt(formData.monthlyBudget) || 10000;
                    
                    const uplift = isCasual ? 8 : (isMidcore ? 14 : 10);
                    const projectedD7 = baseD7 + uplift;
                    const roasTarget = isHighIap ? "130-170%" : "100-120%";
                    const breakevenDays = isHighIap ? "45-60 days" : (isCasual ? "14-21 days" : "30-45 days");

                    const genreDynamics = {
                        Puzzle: {
                            intro: `With its engaging core loops and accessible progression structure, Puzzle mechanics drive exceptionally strong early user retention.`,
                            callout: `be perfectly positioned to capture our "Daily Habit" segment—ensuring a steady stream of highly engaged users`,
                            milestone3Rationale: `Filters for analytical, committed minds who love conquering progressive logic milestones.`,
                            segARationale: `Similar puzzle blockbusters witness 30%+ higher day 14 loyalty in this category.`,
                            segBDesc: `Casual users seeking satisfying cognitive puzzles with regular micro-earning check-ins.`,
                            creativeProp: `Conquer logic challenges and cash out your progress daily`,
                            risk1Desc: `Puzzle enthusiasts bounce quickly if the onboarding learning curve is needlessly steep.`,
                            risk1Mit: `A/B test early stage difficulties and reward players immediately after Level 5 completion.`
                        },
                        RPG: {
                            intro: `Deep character metadata and immersive leveling progression represent the gold standard for securing high-LTV players.`,
                            callout: `target our premium "Meta Progression" players who invest heavy screen-time into strategic goals`,
                            milestone3Rationale: `Confirms significant gameplay commitment, identifying prospective premium spenders.`,
                            segARationale: `RPG lovers on Freecash display unparalleled day-60 longevity benchmarks.`,
                            segBDesc: `Dedicated RPG gamers eager to level-up meta profiles for substantial long-term benefits.`,
                            creativeProp: `Forge your hero, advance your path, and unlock real financial earnings`,
                            risk1Desc: `Complex introductory systems can overwhelm mainstream users expecting faster milestones.`,
                            risk1Mit: `Integrate immediate micro-payouts for basic tutorial progression milestones.`
                        },
                        Strategy: {
                            intro: `Complex base management, faction mechanics, and cooperative alliances represent highly lucrative terrain for competitive players.`,
                            callout: `dominate in our "Tactical Competitive" segment, maximizing immediate conversion value`,
                            milestone3Rationale: `Proves robust user integration into competitive community clans or guild layers.`,
                            segARationale: `Strategy players demonstrate our network's highest average monthly investment.`,
                            segBDesc: `Strategic planners optimized to calculate reward loops and invest maximum session length.`,
                            creativeProp: `Establish your base, organize your army, and command real payouts`,
                            risk1Desc: `Extended base build times can dull motivation during early game gaps.`,
                            risk1Mit: `Introduce frequent micro-rewards centered on basic upgrade completions.`
                        },
                        Casual: {
                            intro: `Broad audience compatibility and intuitive mechanics ensure exceptional volume generation capabilities.`,
                            callout: `excel inside our high-volume "Immediate Action" roster for rapid installation velocities`,
                            milestone3Rationale: `Validates daily routine creation, setting up steady advertising exposure channels.`,
                            segARationale: `Extremely responsive user pool guarantees rapid early scaling.`,
                            segBDesc: `Gamers who love short-session, stress-free gameplay with fast verification.`,
                            creativeProp: `Match, spin, and tap your path to real payouts on Freecash`,
                            risk1Desc: `High churn risk if the reward system isn't immediately contextualized in-game.`,
                            risk1Mit: `Distribute the first micro-payout event within exactly 3 minutes of app initialization.`
                        }
                    };

                    const dynamics = genreDynamics[formData.genre] || genreDynamics['Casual'];
                    const monetizationStrategyText = isHighIap 
                        ? 'mobilizing strong internal purchase architecture to systematically harvest maximum whale LTV.' 
                        : 'relying on highly optimized ad placements and balanced micro-transaction layers to yield high-volume returns.';

                    const brief = {
                        executiveSummary: {
                            intro: `Strategic evaluation of ${formData.gameName} by ${formData.studioName} indicates robust, scalable viability. ${dynamics.intro} By ${monetizationStrategyText}`,
                            d7Uplift: `${projectedD7 - 2}% - ${projectedD7 + 3}%`,
                            roas: roasTarget,
                            breakeven: breakevenDays,
                            callout: `🎯 Strategic Target: ${formData.gameName} will ${dynamics.callout}. Implementation optimizes campaign ROAS directly toward ${roasTarget} inside 60 days.`
                        },
                        rewardTiers: [
                            { milestone: "Milestone 1 (Install & Initialize)", amount: "€0.08-0.12", segment: "All users", rationale: "Minimal friction trigger, boosting App Store velocity ranking." },
                            { milestone: "Milestone 2 (Tutorial Finish)", amount: "€0.20-0.35", segment: "All users", rationale: "Guarantees base system literacy. Dramatically trims Day 1 dropoff rates." },
                            { milestone: `Milestone 3 (${formData.primaryGate || 'Reach Level 10'})`, amount: "€0.80-1.60", segment: "High-intent", rationale: dynamics.milestone3Rationale },
                            { milestone: "Milestone 4 (First In-App Store Purchase)", amount: "€3.50-5.50", segment: "High spenders", rationale: "Safeguards premium positive ROI offsets and hooks competitive high-rollers." }
                        ],
                        segments: [
                            { title: `Segment A: ${formData.genre} Specialists`, desc: "High engagement histories inside matching genre titles.", priority: "Priority 1 (Strategic Start)", d7: projectedD7 + 2, vol: Math.round(formData.targetInstalls * 0.55), rationale: dynamics.segARationale },
                            { title: "Segment B: Progressive Earners", desc: dynamics.segBDesc, priority: "Priority 2 (Scaling Phase)", d7: projectedD7 - 3, vol: Math.round(formData.targetInstalls * 0.35), rationale: "Highly scalable demographics allowing for mass volume expansions." },
                            { title: "Segment C: High-LTV Premium Whales", desc: "Users verified to regularly convert in-app with verified billing.", priority: "Priority 3 (Whale Harvest)", d7: projectedD7 + 8, vol: Math.round(formData.targetInstalls * 0.10), rationale: "The absolute highest transactional density, critical for robust scaling." }
                        ],
                        kpis: [
                            { name: "Day 1 Retention", target: `${baseD7 + 26}% - ${baseD7 + 32}%`, rationale: "Uplift powered by early reward mechanics", bench: `${baseD7 + 20}%`, status: 'good' },
                            { name: "Day 7 Retention", target: `${projectedD7}% - ${projectedD7 + 4}%`, rationale: "Sustained by tiered milestone challenges", bench: `${baseD7}%`, status: 'good' },
                            { name: "Day 30 Retention", target: `${Math.round(projectedD7 * 0.45)}% - ${Math.round(projectedD7 * 0.52)}%`, rationale: "Deep reward structures retain late cohorts", bench: `${Math.round(baseD7 * 0.4)}%`, status: 'neutral' },
                            { name: "LTV (Day 60)", target: `€${(parseFloat(formData.d60Ltv || 1.0) * 1.45).toFixed(2)} - €${(parseFloat(formData.d60Ltv || 1.0) * 1.75).toFixed(2)}`, rationale: "Tailored monetization gate synchronization", bench: `€${parseFloat(formData.d60Ltv || 1.0).toFixed(2)}`, status: 'good' },
                            { name: "ROAS (Day 60)", target: roasTarget, rationale: "Highly feasible given correct audience targeting", bench: "110%", status: 'good' },
                            { name: "CPI Target Zone", target: "€0.70 - €1.10", rationale: "Ideal range balancing acquisition and user quality", bench: "€0.85", status: 'neutral' }
                        ],
                        creative: {
                            prop: dynamics.creativeProp,
                            angles: [
                                `🎮 Play ${formData.gameName} — Pure entertainment without forced video ads tracking.`,
                                "💰 Instant withdrawals supported directly to local payment setups.",
                                "🏆 Compete alongside 60M+ monthly gamers maximizing their time value."
                            ],
                            assets: [
                                "3x high-contrast screenshots juxtaposing active UI and payouts",
                                "1x 15-second mobile gameplay clip showcasing smooth progression",
                                `CTA Template: "Reach ${formData.primaryGate.split(' ')[0] || 'Milestone'} to unlock €X reward"`
                            ],
                            avoid: [
                                '"Get rich quick" visual schemes or sketchy earning promises',
                                'Fabricated playstyle captures that omit standard interface looks',
                                'Highly complex, text-heavy explanations detailing cash-outs'
                            ]
                        },
                        risks: [
                            { severity: "High", color: "text-red-500 bg-red-950/40 border-red-800", icon: "🔴", name: "Reward Cannibalizing", desc: "Regular players may postpone expected shop purchases to rely on campaign rewards.", mitigation: "Limit cash incentives strictly to mid-tier thresholds; ensure premium shop inventory feels superior." },
                            { severity: "Medium", color: "text-amber-500 bg-amber-950/40 border-amber-800", icon: "🟡", name: "Early Churn Threat", desc: dynamics.risk1Desc, mitigation: dynamics.risk1Mit },
                            { severity: "Medium", color: "text-amber-500 bg-amber-950/40 border-amber-800", icon: "🟡", name: "Creative Burnout", desc: "Repeated massive exposures naturally wear down creative efficiency benchmarks.", mitigation: "Formulate a dynamic assets queue, committing to cycling top layouts bi-weekly." }
                        ]
                    };

                    const totalDays = parseInt(formData.duration);
                    let activeRoadmap = [];

                    if (totalDays === 30) {
                        activeRoadmap = [
                            { phase: "Days 1-7", status: "blue", title: "Integration & Initial Verification", items: ["Implement telemetry & postbacks", `Controlled soft-launch: Cap at ${Math.round(formData.targetInstalls * 0.2)} daily installs`, "Monitor tracking validations"] },
                            { phase: "Days 8-15", status: "blue", title: "Milestone Calibration", items: ["Evaluate D1 & D3 cohort behaviors", "Fine-tune progression steps to optimize budgets", `Scale to ${Math.round(formData.targetInstalls * 0.55)} daily installs`] },
                            { phase: "Days 16-23", status: "green", title: "Targeted Growth Scale", items: [`Push campaign velocity toward ${formData.targetInstalls} daily installs`, "Initiate targeted segment rules", "Analyze early ROAS models"] },
                            { phase: "Days 24-30", status: "gray", title: "Cohort Analysis & Review", items: ["Consolidate 30-day cohort metrics", "Evaluate target ROI curves", "Establish expansion strategies"] }
                        ];
                    } else if (totalDays === 60) {
                        activeRoadmap = [
                            { phase: "Weeks 1-2", status: "blue", title: "Technical Verification & Calibration", items: ["Configure network API links", `Set up initial benchmark limit of ${Math.round(formData.targetInstalls * 0.3)} daily installs`, "Cross-verify payout conversions"] },
                            { phase: "Weeks 3-4", status: "blue", title: "Initial Scaling & Creative Optimization", items: [`Elevate daily volumes toward ${Math.round(formData.targetInstalls * 0.7)} daily installs`, "Implement creative variations testing", "Identify high-performing channels"] },
                            { phase: "Weeks 5-6", status: "green", title: "Velocity Push Phase", items: [`Command maximum daily run rates of ${formData.targetInstalls} installs`, "Open targeting to all secondary tiers", "Optimize cost layouts dynamically"] },
                            { phase: "Weeks 7-8", status: "gray", title: "LTV Modeling & Refinement", items: ["Run Day-45 LTV progression analysis", "Stabilize daily traffic values", "Approve subsequent quarter budgets"] }
                        ];
                    } else {
                        activeRoadmap = [
                            { phase: "Month 1", status: "blue", title: "Technical Setup & Performance Baselines", items: ["Align API reporting", `Initiate validation cohorts: ${Math.round(formData.targetInstalls * 0.4)} daily installs`, "Secure early system metrics"] },
                            { phase: "Month 2", status: "green", title: "Aggressive Volume Escalation", items: [`Unleash targeting at ${formData.targetInstalls} daily installs`, "Launch optimized localization styles", "Track cohort milestone velocities"] },
                            { phase: "Month 3", status: "gray", title: "Maximization & Expansion Review", items: ["Consolidate long-term retention trends", "Fine-tune secondary target rules", "Prepare next game integration specs"] }
                        ];
                    }

                    if (formData.prevFreecash) {
                        activeRoadmap[0].title += " (Fast-Tracked)";
                        activeRoadmap[0].items = ["Reuse existing telemetry templates", "Skip low-volume validation caps", `Initialize scaling directly at ${Math.round(formData.targetInstalls * 0.65)} daily installs`];
                    }

                    brief.roadmap = activeRoadmap;
                    setGeneratedBrief(brief);
                    setIsGenerating(false);
                    setTimeout(() => {
                        document.getElementById('brief-results').scrollIntoView({ behavior: 'smooth' });
                    }, 200);
                }, 1800);
            };

            const triggerClipboardCopy = () => {
                const textToCopy = `Almedia Strategic Campaign Brief\nGame: ${formData.gameName}\nStudio: ${formData.studioName}\nTarget ROAS: ${generatedBrief ? generatedBrief.executiveSummary.roas : "130-170%"}\nUplift Target: ${generatedBrief ? generatedBrief.executiveSummary.d7Uplift : "N/A"}`;
                navigator.clipboard.writeText(textToCopy);
                setCopiedText(true);
                setTimeout(() => setCopiedText(false), 2000);
            };

            return (
                <div className="min-h-screen bg-black text-gray-100 pb-24">
                    {/* Brand Header */}
                    <header className="border-b border-brandBorder bg-black sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded bg-brandBlue flex items-center justify-center font-black text-white text-xl tracking-tighter">A</div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                                        Almedia <span className="text-brandCyan font-semibold">Strategy Builder</span>
                                    </h1>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 mt-10">
                        {/* Dynamic Warning Alert for high IAP */}
                        {formData.iapPercent > 80 && (
                            <div className="mb-6 p-4 bg-brandBlue/10 border border-brandBlue/50 text-brandCyan rounded-lg flex items-center gap-3 text-sm">
                                <Icons.ShieldAlert />
                                <span><strong>Monetization Notice:</strong> Highly focused on IAP ({formData.iapPercent}%). Strategy brief will automatically optimize toward deeper funnel milestones to maximize whale values.</span>
                            </div>
                        )}

                        {/* Profiler Card */}
                        <div className="bg-brandCard rounded-xl border border-brandBorder shadow-xl overflow-hidden">
                            <div className="p-6 border-b border-brandBorder bg-gradient-to-r from-brandCard to-black">
                                <h2 className="text-xl font-bold flex items-center gap-2 text-white">
                                    <Icons.Zap /> Studio & App Profiler
                                </h2>
                                <p className="text-xs text-gray-400 mt-1">Input baseline game metrics to construct a dynamically simulated campaign brief.</p>
                            </div>

                            <div className="p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
                                {/* 1. Game Info */}
                                <div className="space-y-4 border-r border-brandBorder/30 pr-2">
                                    <h3 className="text-xs font-bold text-brandCyan uppercase tracking-widest">1. Game Info</h3>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-400 mb-1">Game Name</label>
                                        <input type="text" name="gameName" value={formData.gameName} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white focus:outline-none focus:border-brandCyan" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-400 mb-1">Studio Name</label>
                                        <input type="text" name="studioName" value={formData.studioName} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white focus:outline-none focus:border-brandCyan" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-400 mb-1">Primary Genre</label>
                                        <select name="genre" value={formData.genre} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white focus:outline-none focus:border-brandCyan">
                                            <option>Puzzle</option>
                                            <option>RPG</option>
                                            <option>Strategy</option>
                                            <option>Casual</option>
                                        </select>
                                    </div>
                                </div>

                                {/* 2. Monetization */}
                                <div className="space-y-4 border-r border-brandBorder/30 pr-2">
                                    <h3 className="text-xs font-bold text-brandCyan uppercase tracking-widest">2. Monetization</h3>
                                    <div>
                                        <label className="flex justify-between text-xs font-semibold text-gray-400 mb-1">
                                            <span>Revenue Split</span>
                                            <span className="text-brandCyan font-mono">{formData.iapPercent}% IAP / {formData.adPercent}% Ads</span>
                                        </label>
                                        <input type="range" name="iapPercent" min="0" max="100" value={formData.iapPercent} onChange={handleInputChange} className="w-full accent-slider mt-2" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-400 mb-1">Primary Monetization Gate</label>
                                        <input type="text" name="primaryGate" value={formData.primaryGate} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white focus:outline-none focus:border-brandCyan" />
                                    </div>
                                </div>

                                {/* 3. Baselines */}
                                <div className="space-y-4 border-r border-brandBorder/30 pr-2">
                                    <h3 className="text-xs font-bold text-brandCyan uppercase tracking-widest">3. Baselines</h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-400 mb-1">D7 Ret (%)</label>
                                            <input type="number" name="d7Retention" value={formData.d7Retention} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white font-mono focus:outline-none focus:border-brandCyan" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-400 mb-1">D60 LTV (€)</label>
                                            <input type="number" step="0.1" name="d60Ltv" value={formData.d60Ltv} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white font-mono focus:outline-none focus:border-brandCyan" />
                                        </div>
                                    </div>
                                    <div className="pt-4 flex items-center">
                                        <input type="checkbox" id="prevFreecash" name="prevFreecash" checked={formData.prevFreecash} onChange={handleInputChange} className="w-4 h-4 rounded text-brandBlue bg-black border-brandBorder accent-brandCyan focus:ring-0" />
                                        <label htmlFor="prevFreecash" className="ml-2.5 text-xs text-gray-300 select-none cursor-pointer">Previous Freecash experience</label>
                                    </div>
                                </div>

                                {/* 4. Goals */}
                                <div className="space-y-4">
                                    <h3 className="text-xs font-bold text-brandCyan uppercase tracking-widest">4. Goals</h3>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-400 mb-1">Target Daily Installs</label>
                                        <input type="number" name="targetInstalls" value={formData.targetInstalls} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white font-mono focus:outline-none focus:border-brandCyan" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-400 mb-1">Budget/mo (€)</label>
                                            <input type="number" name="monthlyBudget" value={formData.monthlyBudget} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-sm text-white font-mono focus:outline-none focus:border-brandCyan" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-400 mb-1">Duration</label>
                                            <select name="duration" value={formData.duration} onChange={handleInputChange} className="w-full bg-black border border-brandBorder rounded p-2 text-xs text-white focus:outline-none focus:border-brandCyan">
                                                <option value="30 days">30 days</option>
                                                <option value="60 days">60 days</option>
                                                <option value="90 days">90 days</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 bg-black border-t border-brandBorder flex justify-between items-center flex-wrap gap-4">
                                <div className="text-xs text-gray-400">
                                    {formData.monthlyBudget < 20000 ? (
                                        <span className="text-amber-400 flex items-center gap-1.5"><Icons.ShieldAlert /> Budget under €20,000. Recommending high-retention validation roadmap.</span>
                                    ) : (
                                        <span className="text-emerald-400 flex items-center gap-1.5">✓ Standard budget optimization verified. Enterprise priority configuration active.</span>
                                    )}
                                </div>
                                <button 
                                    onClick={generateStrategyBrief}
                                    disabled={isGenerating}
                                    className="px-6 py-2.5 bg-brandBlue hover:bg-blue-700 active:scale-95 transition-all text-white font-bold text-sm rounded flex items-center gap-2"
                                >
                                    {isGenerating ? (
                                        <><span className="animate-spin">⚙️</span> Building Strategy...</>
                                    ) : (
                                        <><Icons.Zap /> Generate Strategy Brief</>
                                    )}
                                </button>
                            </div>
                        </div>

                        {/* Generated Brief Section */}
                        {generatedBrief && (
                            <section id="brief-results" className="mt-12 space-y-6">
                                <div className="flex items-center justify-between border-b border-brandBorder pb-4">
                                    <div>
                                        <h2 className="text-2xl font-bold text-white tracking-tight">{formData.gameName} Strategy Strategy</h2>
                                        <p className="text-xs text-gray-400 mt-1">Simulated forecast metrics aligned specifically for {formData.studioName}</p>
                                    </div>
                                    <span className="text-xs font-extrabold px-3 py-1 rounded bg-brandBlue/20 text-brandCyan border border-brandBlue/40 uppercase tracking-widest">Active Forecast</span>
                                </div>

                                {/* Custom Tab Controller */}
                                <div className="flex overflow-x-auto border-b border-brandBorder custom-scroll pb-1 gap-1">
                                    {[
                                        { id: 'summary', name: 'Executive Summary', icon: <Icons.Lightbulb /> },
                                        { id: 'rewards', name: 'Reward Strategy', icon: <Icons.Target /> },
                                        { id: 'segments', name: 'Target Segments', icon: <Icons.Users /> },
                                        { id: 'kpis', name: 'KPI Benchmarks', icon: <Icons.BarChart /> },
                                        { id: 'roadmap', name: 'Adaptive Roadmap', icon: <Icons.Calendar /> },
                                        { id: 'creative', name: 'Creative Rules', icon: <Icons.Zap /> },
                                        { id: 'risks', name: 'Risk Mitigations', icon: <Icons.ShieldAlert /> }
                                    ].map(tab => (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`flex items-center gap-2 px-4 py-3 text-xs font-semibold whitespace-nowrap transition-all border-b-2
                                                ${activeTab === tab.id 
                                                    ? 'border-brandCyan text-brandCyan bg-brandBlue/5' 
                                                    : 'border-transparent text-gray-400 hover:text-white hover:border-gray-700'}`}
                                        >
                                            {tab.icon}
                                            {tab.name}
                                        </button>
                                    ))}
                                </div>

                                {/* Output Content Panel */}
                                <div className="bg-brandCard border border-brandBorder rounded-xl min-h-[380px] p-8">
                                    
                                    {/* Tab 1: Executive Summary */}
                                    {activeTab === 'summary' && (
                                        <div className="space-y-6">
                                            <div>
                                                <h3 className="text-lg font-bold text-white mb-2">Simulated Overview</h3>
                                                <p className="text-gray-300 text-sm leading-relaxed">{generatedBrief.executiveSummary.intro}</p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4">
                                                <div className="bg-black border border-brandBorder p-5 rounded-lg">
                                                    <div className="text-xs text-gray-400">Projected Day-7 Uplift</div>
                                                    <div className="text-2xl font-mono font-bold text-brandCyan mt-1">{generatedBrief.executiveSummary.d7Uplift}</div>
                                                </div>
                                                <div className="bg-black border border-brandBorder p-5 rounded-lg">
                                                    <div className="text-xs text-gray-400">Target ROAS (Day-60)</div>
                                                    <div className="text-2xl font-mono font-bold text-brandCyan mt-1">{generatedBrief.executiveSummary.roas}</div>
                                                </div>
                                                <div className="bg-black border border-brandBorder p-5 rounded-lg">
                                                    <div className="text-xs text-gray-400">Projected Breakeven</div>
                                                    <div className="text-2xl font-mono font-bold text-white mt-1">{generatedBrief.executiveSummary.breakeven}</div>
                                                </div>
                                            </div>

                                            <div className="bg-brandBlue/10 border border-brandBlue/30 p-5 rounded-lg flex gap-3 mt-4">
                                                <div className="text-xl">⚡</div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-white">Target Insight Analysis</h4>
                                                    <p className="text-xs text-gray-300 mt-1 leading-relaxed">{generatedBrief.executiveSummary.callout}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Tab 2: Reward Strategy */}
                                    {activeTab === 'rewards' && (
                                        <div className="space-y-4">
                                            <div>
                                                <h3 className="text-lg font-bold text-white">Tailored Progression Milestones</h3>
                                                <p className="text-xs text-gray-400">Simulating financial incentive thresholds aligned directly with {formData.genre} behaviors.</p>
                                            </div>
                                            <div className="overflow-x-auto mt-4">
                                                <table className="w-full text-left text-sm border-collapse">
                                                    <thead>
                                                        <tr className="bg-black text-gray-400 text-xs uppercase tracking-widest border-b border-brandBorder">
                                                            <th className="p-4">Target Milestone</th>
                                                            <th className="p-4">Recommended Allocation</th>
                                                            <th className="p-4">Ideal Segment Focus</th>
                                                            <th className="p-4">Structural Rationale</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-brandBorder/40">
                                                        {generatedBrief.rewardTiers.map((tier, idx) => (
                                                            <tr key={idx} className={`hover:bg-brandBlue/5 transition-colors ${idx === 2 ? 'bg-brandBlue/10' : ''}`}>
                                                                <td className="p-4 font-semibold text-white flex items-center gap-2">
                                                                    {idx === 2 && <span className="w-1.5 h-1.5 rounded-full bg-brandCyan"></span>}
                                                                    {tier.milestone}
                                                                </td>
                                                                <td className="p-4 font-mono font-bold text-brandCyan">{tier.amount}</td>
                                                                <td className="p-4 text-xs text-gray-300">{tier.segment}</td>
                                                                <td className="p-4 text-xs text-gray-400">{tier.rationale}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {/* Tab 3: Target Segments */}
                                    {activeTab === 'segments' && (
                                        <div className="space-y-6">
                                            <div>
                                                <h3 className="text-lg font-bold text-white">Target Freecash Demographics</h3>
                                                <p className="text-xs text-gray-400">Mapping acquisition priorities against historical cohort behaviors.</p>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {generatedBrief.segments.map((seg, idx) => (
                                                    <div key={idx} className={`bg-black rounded-lg p-6 border ${idx === 0 ? 'border-brandCyan/80 shadow-lg shadow-brandCyan/5' : 'border-brandBorder'}`}>
                                                        <span className="text-[10px] font-bold text-brandCyan uppercase tracking-widest">{seg.priority}</span>
                                                        <h4 className="text-sm font-bold text-white mt-1 mb-2">{seg.title}</h4>
                                                        <p className="text-xs text-gray-400 h-12 leading-relaxed">{seg.desc}</p>
                                                        <div className="border-t border-brandBorder/60 pt-4 mt-4 space-y-2 text-xs font-mono">
                                                            <div className="flex justify-between">
                                                                <span className="text-gray-500">Projected D7:</span>
                                                                <span className="text-brandCyan font-bold">{seg.d7}%</span>
                                                            </div>
                                                            <div className="flex justify-between">
                                                                <span className="text-gray-500">Daily Target:</span>
                                                                <span className="text-white font-bold">{seg.vol.toLocaleString()} UA</span>
                                                            </div>
                                                        </div>
                                                        <div className="border-t border-brandBorder/30 pt-3 mt-3 text-[10px] italic text-gray-500">
                                                            Cohort logic: {seg.rationale}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Tab 4: KPI Benchmarks */}
                                    {activeTab === 'kpis' && (
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center flex-wrap gap-2">
                                                <div>
                                                    <h3 className="text-lg font-bold text-white">KPI Target Models</h3>
                                                    <p className="text-xs text-gray-400">Comparing estimated simulation parameters against baseline industry averages.</p>
                                                </div>
                                            </div>
                                            <div className="overflow-x-auto mt-4">
                                                <table className="w-full text-left text-sm border-collapse">
                                                    <thead>
                                                        <tr className="bg-black text-gray-400 text-xs uppercase tracking-widest border-b border-brandBorder">
                                                            <th className="p-4">Target Parameter</th>
                                                            <th className="p-4">Target Strategy</th>
                                                            <th className="p-4">Simulated Forecast Rationale</th>
                                                            <th className="p-4">Category Benchmark</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-brandBorder/40">
                                                        {generatedBrief.kpis.map((kpi, idx) => (
                                                            <tr key={idx} className="hover:bg-brandBorder/20 transition-colors">
                                                                <td className="p-4 font-semibold text-white">{kpi.name}</td>
                                                                <td className="p-4">
                                                                    <span className={`inline-block px-2.5 py-1 text-xs font-mono font-bold rounded
                                                                        ${kpi.status === 'good' ? 'bg-emerald-950/40 text-emerald-400 border border-emerald-900/50' : 'bg-brandBorder text-gray-300'}`}>
                                                                        {kpi.target}
                                                                    </span>
                                                                </td>
                                                                <td className="p-4 text-xs text-gray-400">{kpi.rationale}</td>
                                                                <td className="p-4 font-mono text-xs text-gray-500">{kpi.bench}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {/* Tab 5: Adaptive Roadmap */}
                                    {activeTab === 'roadmap' && (
                                        <div className="space-y-6">
                                            <div>
                                                <h3 className="text-lg font-bold text-white">Integrated Deployment Timeline ({formData.duration})</h3>
                                                <p className="text-xs text-gray-400">Step-by-step launch sequencing adapted to simulated budget targets.</p>
                                            </div>
                                            <div className="border-l border-brandBorder pl-6 ml-4 space-y-8 relative">
                                                {generatedBrief.roadmap.map((step, idx) => (
                                                    <div key={idx} className="relative">
                                                        {/* Step indicator bullet */}
                                                        <span className={`absolute -left-[31px] top-1.5 w-3.5 h-3.5 rounded-full border-2 border-black
                                                            ${step.status === 'blue' ? 'bg-brandCyan' : step.status === 'green' ? 'bg-brandBlue' : 'bg-gray-500'}`}>
                                                        </span>
                                                        <div className="bg-black/60 border border-brandBorder rounded-lg p-5">
                                                            <div className="text-[10px] font-bold text-brandCyan uppercase tracking-widest">{step.phase}</div>
                                                            <h4 className="text-sm font-bold text-white mt-0.5 mb-3">{step.title}</h4>
                                                            <ul className="space-y-2 text-xs text-gray-300">
                                                                {step.items.map((item, id) => (
                                                                    <li key={id} className="flex items-center gap-2">
                                                                        <span className="text-emerald-400">✓</span>
                                                                        <span>{item}</span>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Tab 6: Creative Rules */}
                                    {activeTab === 'creative' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-6">
                                                <div>
                                                    <span className="text-[10px] font-bold text-brandCyan uppercase tracking-widest">Core Marketing Direction</span>
                                                    <h3 className="text-lg font-bold text-white mt-1">Value Prop Strategy</h3>
                                                </div>
                                                <div className="bg-black border border-brandBorder/60 p-5 rounded-lg border-l-4 border-l-brandCyan">
                                                    <p className="text-sm font-bold text-white italic">"{generatedBrief.creative.prop}"</p>
                                                </div>
                                                <div className="space-y-3">
                                                    <h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Simulated Ad Angles</h4>
                                                    <ul className="space-y-2.5 text-xs text-gray-300">
                                                        {generatedBrief.creative.angles.map((angle, id) => (
                                                            <li key={id} className="flex items-start gap-2">
                                                                <span className="text-brandCyan">•</span>
                                                                <span>{angle}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>

                                            <div className="space-y-6">
                                                <div className="bg-black border border-brandBorder p-5 rounded-lg">
                                                    <h4 className="text-xs font-bold text-brandCyan uppercase tracking-widest mb-3">Required Assets</h4>
                                                    <ul className="space-y-2 text-xs text-gray-300">
                                                        {generatedBrief.creative.assets.map((asset, id) => (
                                                            <li key={id} className="flex items-center gap-2">
                                                                <span className="w-1.5 h-1.5 rounded-full bg-brandCyan"></span>
                                                                <span>{asset}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>

                                                <div className="bg-red-950/20 border border-red-900/60 p-5 rounded-lg">
                                                    <h4 className="text-xs font-bold text-red-400 uppercase tracking-widest mb-3">⚠️ Guidelines to Avoid</h4>
                                                    <ul className="space-y-2 text-xs text-red-300/90">
                                                        {generatedBrief.creative.avoid.map((avoid, id) => (
                                                            <li key={id} className="flex items-start gap-2">
                                                                <span>×</span>
                                                                <span>{avoid}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Tab 7: Risk Mitigations */}
                                    {activeTab === 'risks' && (
                                        <div className="space-y-6">
                                            <div>
                                                <h3 className="text-lg font-bold text-white">Risk Matrix Analysis</h3>
                                                <p className="text-xs text-gray-400">Evaluating prospective friction points and immediate technical resolutions.</p>
                                            </div>
                                            <div className="space-y-4">
                                                {generatedBrief.risks.map((risk, idx) => (
                                                    <div key={idx} className={`bg-black border p-5 rounded-lg flex flex-col md:flex-row gap-4 justify-between items-start md:items-center ${risk.color}`}>
                                                        <div className="space-y-1">
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <span className="text-base">{risk.icon}</span>
                                                                <h4 className="text-sm font-bold text-white">{risk.name}</h4>
                                                                <span className="text-[10px] font-bold uppercase tracking-widest opacity-80">({risk.severity} Severity)</span>
                                                            </div>
                                                            <p className="text-xs text-gray-400 max-w-2xl">{risk.desc}</p>
                                                        </div>
                                                        <div className="bg-black border border-brandBorder/80 p-3 rounded text-xs text-gray-300 max-w-sm w-full md:w-auto">
                                                            <strong>Mitigation Resolution:</strong> {risk.mitigation}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                </div>

                                {/* Shared Action Controls */}
                                <div className="mt-8 flex flex-wrap gap-4 justify-end">
                                    <button 
                                        onClick={triggerClipboardCopy}
                                        className="px-6 py-3 rounded text-xs font-bold border border-brandBorder bg-transparent hover:bg-white/5 text-gray-300 transition-all min-w-[140px] flex items-center justify-center gap-2"
                                    >
                                        {copiedText ? <><Icons.Check /> Copied</> : <><Icons.Copy /> Copy Code</>}
                                    </button>
                                    <button className="px-6 py-3 rounded text-xs font-bold border border-brandBorder bg-transparent hover:bg-white/5 text-gray-300 transition-all min-w-[140px] flex items-center justify-center gap-2">
                                        <Icons.Link /> Share Link
                                    </button>
                                    <button className="px-6 py-3 rounded text-xs font-bold border border-brandBorder bg-transparent hover:bg-white/5 text-gray-300 transition-all min-w-[140px] flex items-center justify-center gap-2">
                                        <Icons.Mail /> Email CS
                                    </button>
                                    <button className="px-6 py-3 rounded text-xs font-bold bg-brandBlue hover:bg-blue-700 text-white transition-all min-w-[140px] flex items-center justify-center gap-2">
                                        <Icons.Download /> Download PDF
                                    </button>
                                </div>

                            </section>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlmediaDashboard />);
    </script>
</body>
</html>
